name: Otomatik Shorts Botu

on:
  schedule:
    - cron: '05 16 * * *'  # TSİ 19:05
    - cron: '05 19 * * *'  # TSİ 22:05
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Imagemagick Kur ve Ayarla
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick fonts-dejavu-core
          sudo rm -f /etc/ImageMagick-6/policy.xml
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <policymap>
            <policy domain="coder" rights="read|write" pattern="label" />
            <policy domain="coder" rights="read|write" pattern="caption" />
            <policy domain="coder" rights="read|write" pattern="text" />
            <policy domain="path" rights="read|write" pattern="@*" />
            <policy domain="resource" name="memory" value="2GiB"/>
            <policy domain="resource" name="map" value="4GiB"/>
            <policy domain="resource" name="width" value="10KP"/>
            <policy domain="resource" name="height" value="10KP"/>
          </policymap>' | sudo tee /etc/ImageMagick-6/policy.xml

      - name: Kutuphaneleri Kur
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3 decorator==4.4.2 google-api-python-client google-auth-oauthlib google-auth-httplib2 google-auth

      - name: Botu Calistir
        run: python ana_bot.py  # SENİN DOSYA ADINA GÖRE DÜZELTTİM

      - name: Sirayi Kaydet ve Pushla
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add siradaki_soz.txt
          git commit -m "Sıradaki söze geçildi [skip ci]" || echo "Değişiklik yok"
          git push origin main
