name: Video Botu
on:
  schedule:
    - cron: '0 0 * * *' # Her 24 saatte bir (Gece 00:00 UTC) çalışır
  workflow_dispatch: # İstediğin zaman manuel çalıştırmanı sağlar

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Sistem Kurulumu
        run: |
          sudo apt-get update
          sudo apt-get install imagemagick -y
          pip install moviepy google-api-python-client google-auth-oauthlib
      - name: Botu Tetikle
        run: python ana_bot.py
      - name: Sirayi Guncelle
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add siradaki_soz.txt
          git commit -m "24 saatlik periyot tamamlandi" || echo "Degisiklik yok"
          git push
