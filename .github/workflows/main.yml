name: YouTube Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: FFmpeg kur
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Paketleri kur
        run: pip install -r requirements.txt

      - name: Secret dosyalarını oluştur
        run: |
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.TOKEN_JSON }}' > token.json

      - name: Botu çalıştır
        run: python main.py

      - name: State dosyasını kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A
          git commit -m "Update video state" || echo "No changes to commit"

          git stash --include-untracked || true
          git pull --rebase origin main || git pull origin main
          git stash pop || true

          git add -A
          git commit -m "Update video state after pull" || echo "No extra changes"

          git push origin main
